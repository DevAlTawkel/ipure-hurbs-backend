services:
  - type: web
    name: ipureherbs-backend
    runtime: php
    plan: free
    buildCommand: ./render-build.sh
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_NAME
        value: iPureHerbs
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: ipureherbs-backend
          property: host
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: ipureherbs-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ipureherbs-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: ipureherbs-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: ipureherbs-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ipureherbs-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: LOG_CHANNEL
        value: stderr
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_SECRET
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

databases:
  - name: ipureherbs-db
    plan: free
    databaseName: ipureherbs
    user: ipureherbs
