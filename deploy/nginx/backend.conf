# ============================================================
# IPure Herbs — Laravel Backend Nginx Config
# File: /etc/nginx/sites-available/backend
# Enable: ln -s /etc/nginx/sites-available/backend /etc/nginx/sites-enabled/
# ============================================================

server {
    listen 80;
    server_name api.ipureherbs.com;

    # Certbot will auto-upgrade this to HTTPS

    root /var/www/backend/public;
    index index.php;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hide PHP version
    fastcgi_hide_header X-Powered-By;

    # Max upload size (for product images)
    client_max_body_size 20M;

    # Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 8 16k;
    }

    # Block direct access to .env and hidden files
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Stripe webhook — no body size limit
    location /api/webhooks/stripe {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        client_max_body_size 1M;
    }

    # Logs
    access_log /var/log/nginx/backend-access.log;
    error_log  /var/log/nginx/backend-error.log;
}
