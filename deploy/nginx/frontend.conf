# ============================================================
# IPure Herbs — Next.js Frontend Nginx Config
# File: /etc/nginx/sites-available/frontend
# Enable: ln -s /etc/nginx/sites-available/frontend /etc/nginx/sites-enabled/
# ============================================================

# Redirect www → non-www
server {
    listen 80;
    server_name www.ipureherbs.com;
    return 301 https://ipureherbs.com$request_uri;
}

server {
    listen 80;
    server_name ipureherbs.com;

    # Certbot will auto-upgrade this to HTTPS

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Next.js running on port 3000
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Next.js static assets — served directly
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # Block .env files
    location ~ /\.env {
        deny all;
        return 404;
    }

    # Logs
    access_log /var/log/nginx/frontend-access.log;
    error_log  /var/log/nginx/frontend-error.log;
}
